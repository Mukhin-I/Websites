<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление поста Уют-Сервис</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/add.css">
</head>
<body>
    <header class="header" id="header">
        <div class="container">
            <div class="nav">
                <img src="img/logo.svg">
                <ul class="menu">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="#blog">Блог</a></li>
                    <li><a href="#">Предложить</a></li>
                </ul>
                <a href="#" class="login">Вход/Регистрация</a>
            </div>
        </div>
    </header>
    <section class="add" id="add">
        <div class="container">
            <h1 class="add-title">Добавьте свою запись</h1>
            <div class="post-add-wrap">
                <form action="#" class="post-add">
                    <div class="post-name-wrap">
                        <input type="text" name="post-name" class="name-post" placeholder="Введите заголовок записи">
                    </div>
                    <div class="post-cont">
                        <textarea class="post-cont-add" placeholder="Введите текст записи"></textarea>
                    </div>
                    <button type="submit" class="post-add-btn">Добавить запись</button>
                </form>
                <img src="img/1.png" class="add-img">
            </div>
        </div>
    </section>
    <footer class="footer" id="footer">
        <div class="container">
            <div class="footer-cont-wrap">
                <img src="img/logo.svg">
                <ul class="menu">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="index.html">Блог</a></li>
                    <li><a href="add.html">Предложить</a></li>
                </ul>
                <a href="#" class="login">Вход/Регистрация</a>
            </div>
            <hr>
            <div class="f-credits">
                <p>© Уют-Сервис. Все права защищены</p>
                <a href="#"><img src="img/up.svg"></a>
            </div>
        </div>
    </footer>
</body>
</html>
